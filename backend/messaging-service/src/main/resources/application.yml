server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: messaging-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: messaging-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.medical.*"
  datasource:
    url: jdbc:postgresql://localhost:5432/messaging_medical
    username: postgres
    password: odoo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 32

# Secrets alignés sur patient-service (patient) et practitioner-service (pro).
jwt:
  patient-secret: ${JWT_SECRET}
  pro-secret: ${JWT_PRO_SECRET}

integration:
  agenda-base-url: ${AGENDA_BASE_URL:http://localhost:8081}
  patient-base-url: ${PATIENT_BASE_URL:http://localhost:8082}
  practitioner-base-url: ${PRACTITIONER_BASE_URL:http://localhost:8083}
  messaging-secret: ${MESSAGING_INTEGRATION_SECRET:dev-messaging-secret-change-me}

app:
  cors:
    allowed-origins: http://localhost:4300,http://localhost:4200
  messaging:
    max-attachment-bytes-total: 5242880

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
