server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/patient_medical
    username: postgres
    password: odoo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Configuration SMTP pour l'envoi d'emails (réinitialisation MDP)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION:86400000}   # 24 h

# ── Twilio Verify API (OTP réel SMS + Email) ─────────────────────────────────
twilio:
  account-sid: AC69ef1be54f3a269f7a80eb0ceb7db939
  auth-token: 17eb971eb25f973df02e535c3dbba6b8
  verify-service-sid: VAf3f9c58c4a91c2261fc3a3f7e52bda78

# ── Application ──────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: http://localhost:4300,http://localhost:4200
  password-reset:
    token-expiration-minutes: 30
    base-url: ${APP_RESET_URL:http://localhost:4300/auth/reset-password}
  platform-stats:
    secret: ${PLATFORM_STATS_SECRET:dev-platform-stats-key-change-me}

# Inter-services (messagerie : titulaire / proche concerné).
integration:
  messaging-secret: ${MESSAGING_INTEGRATION_SECRET:dev-messaging-secret-change-me}
