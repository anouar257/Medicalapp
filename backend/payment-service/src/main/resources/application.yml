server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.medical.*"
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_medical
    username: postgres
    password: odoo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT pro (aligné sur practitioner-service pour les accès professionnels).
jwt:
  pro-secret: ${JWT_PRO_SECRET}

# Appels inter-services si nécessaire
integration:
  agenda-base-url: ${AGENDA_BASE_URL:http://localhost:8081}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
