server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: agenda-service
  servlet:
    multipart:
      max-file-size: 4MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://localhost:5432/agenda_medical
    username: postgres
    password: odoo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


# JWT patient + pro (alignés sur patient-service / practitioner-service).
jwt:
  patient-secret: ${JWT_SECRET}
  pro-secret: ${JWT_PRO_SECRET}

# Appels inter-services (agrégats administration plateforme, messaging).
integration:
  practitioner-base-url: ${PRACTITIONER_BASE_URL:http://localhost:8083}
  messaging-secret: ${MESSAGING_INTEGRATION_SECRET:dev-messaging-secret-change-me}
  agenda-sync-secret: ${AGENDA_SYNC_SECRET:dev-agenda-sync-secret-change-me}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
