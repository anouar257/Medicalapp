server:
  port: ${SERVER_PORT:8081}

spring:
  servlet:
    multipart:
      max-file-size: 4MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://localhost:5432/agenda_medical
    username: postgres
    password: odoo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Répertoire persistant pour les portraits uploadés (créé automatiquement).
agenda:
  doctor-photos:
    directory: ${AGENDA_DOCTOR_PHOTOS_DIR:${user.home}/.agenda/doctor-photos}

# JWT patient + pro (alignés sur patient-service / practitioner-service).
jwt:
  patient-secret: ${JWT_SECRET:MEDICAl-PATIENT-SERVICE-JWT-SECRET-KEY-256-BITS-CHANGE-IN-PROD-0123456789}
  pro-secret: ${JWT_PRO_SECRET:MEDICAL-PRACTITIONER-SERVICE-JWT-SECRET-KEY-256-BITS-CHANGE-IN-PROD-9876543210}

# Appels inter-services (agrégats administration plateforme, messaging).
integration:
  practitioner-base-url: ${PRACTITIONER_BASE_URL:http://localhost:8083}
  messaging-secret: ${MESSAGING_INTEGRATION_SECRET:dev-messaging-secret-change-me}
  agenda-sync-secret: ${AGENDA_SYNC_SECRET:dev-agenda-sync-secret-change-me}

