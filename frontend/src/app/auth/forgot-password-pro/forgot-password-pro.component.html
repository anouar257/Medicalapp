
    <div class="min-h-screen bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
      <div class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/90 px-4 py-2 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/90">
        <div class="mx-auto flex max-w-5xl items-center justify-between gap-3">
          <a routerLink="/auth/login-pro" class="text-sm font-semibold text-blue-600 dark:text-blue-400">{{ prefs.translate('Retour') }}</a>
          <app-preferences-toolbar />
        </div>
      </div>

      <div class="auth-container fade-in relative px-4 pb-16 pt-8">
        <div class="auth-wrapper mx-auto">
          <div class="logo-container">
            <span class="logo-icon">🩺</span>
            <h2>MedConnect <span class="badge-pro">PRO</span></h2>
          </div>

          <div class="auth-card dark:border-slate-800 dark:bg-slate-900/80 dark:shadow-none">
            <div class="auth-header">
              <h3>{{ prefs.translate('auth.forgot.title') }}</h3>
              <p>{{ prefs.translate('auth.forgot.subtitle') }}</p>
            </div>
            <form (ngSubmit)="onSubmit()" class="auth-form">
              <div class="form-group">
                <label>{{ prefs.translate('auth.forgot.channel') }}</label>
                <div class="channel-toggle">
                  <button type="button" class="toggle-btn" [class.active]="channel==='email'" (click)="channel='email'">📧 Email</button>
                  <button type="button" class="toggle-btn" [class.active]="channel==='sms'" (click)="channel='sms'">📱 SMS</button>
                </div>
              </div>

              <div class="form-group">
                <label>{{ channel === 'email' ? prefs.translate('auth.forgot.emailLabel') : prefs.translate('auth.forgot.phoneLabel') }}</label>
                <input class="custom-input" type="text" [(ngModel)]="identifiant" name="identifiant"
                       [placeholder]="channel === 'email' ? 'votre@email.com' : '+33612345678'" required/>
              </div>

              @if (err) { <div class="text-error mt-1">{{ err }}</div> }
              @if (success) { <div class="badge-success mt-1" style="text-align:center; padding:0.75rem;">{{ success }}</div> }

              <button type="submit" class="btn-submit" [disabled]="loading">
                @if (loading) { <span class="spinner"></span> }
                @else { {{ prefs.translate('auth.forgot.sendLink') }} <span class="arrow">→</span> }
              </button>
            </form>
            <div class="auth-links mt-2">
              <a routerLink="/auth/login-pro">{{ prefs.translate('auth.forgot.backLogin') }}</a>
            </div>
          </div>
        </div>
      </div>
    </div>
