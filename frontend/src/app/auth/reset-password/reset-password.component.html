
    <div class="auth-container fade-in relative">
      <!-- Bouton Retour -->
      <a routerLink="/auth/login" class="btn-global-back">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Retour
      </a>
      <div class="auth-wrapper">
        <div class="logo-container">
          <span class="logo-icon">🩺</span>
          <h2>MedConnect</h2>
        </div>

        <div class="auth-card">
          <div class="auth-header">
            <h3>Nouveau mot de passe</h3>
            <p>Veuillez choisir un mot de passe sécurisé</p>
          </div>
          <form (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
              <label for="mdp">Nouveau mot de passe</label>
              <div class="input-with-icon">
                <span class="icon">🔒</span>
                <input id="mdp" type="password" [(ngModel)]="password" name="mdp" placeholder="Min. 8 caractères" required minlength="8"/>
              </div>
            </div>
            
            <div class="form-group">
              <label for="confirm">Confirmer</label>
              <div class="input-with-icon">
                <span class="icon">🔒</span>
                <input id="confirm" type="password" [(ngModel)]="confirm" name="confirm" placeholder="Confirmez le mot de passe" required/>
              </div>
            </div>
            
            @if (err) { <div class="text-error mt-1">{{ err }}</div> }
            @if (success) { <div class="badge-success mt-1" style="text-align: center; padding: 0.75rem;">{{ success }}</div> }
            
            <button type="submit" class="btn-submit" [disabled]="loading">
              @if (loading) { <span class="spinner"></span> } @else { Réinitialiser <span class="arrow">→</span> }
            </button>
          </form>
          <div class="auth-links mt-2">
            <a routerLink="/auth/login">Retour à la connexion</a>
          </div>
        </div>
      </div>
    </div>
