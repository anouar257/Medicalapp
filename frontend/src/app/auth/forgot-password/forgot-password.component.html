<div class="min-h-screen bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
  <app-navbar />

  <div class="auth-container fade-in relative px-4 pb-16 pt-8">
    <div class="auth-wrapper mx-auto">
      <div class="logo-container">
        <span class="logo-icon">🏺</span>
        <h2>MedConnect</h2>
      </div>

      <div class="auth-card dark:border-slate-800 dark:bg-slate-900/80 dark:shadow-none">
        <div class="auth-header">
          <h3>{{ prefs.translate('AUTH.FORGOT.TITLE') }}</h3>
          <p>{{ prefs.translate('AUTH.FORGOT.SUBTITLE') }}</p>
        </div>
        <form (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-group">
            <label>{{ prefs.translate('AUTH.FORGOT.CHANNEL') }}</label>
            <div class="channel-toggle">
              <button type="button" class="toggle-btn" [class.active]="channel==='email'" (click)="channel='email'">
                {{ prefs.translate('AUTH.FORGOT.CHANNEL_EMAIL') }}
              </button>
              <button type="button" class="toggle-btn" [class.active]="channel==='sms'" (click)="channel='sms'">
                {{ prefs.translate('AUTH.FORGOT.CHANNEL_SMS') }}
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="identifiant">
              {{ channel === 'email' ? prefs.translate('AUTH.FORGOT.EMAIL_LABEL') : prefs.translate('AUTH.FORGOT.PHONE_LABEL') }}
            </label>
            <div class="input-with-icon">
              <span class="icon">{{ channel === 'email' ? '✉️' : '📱' }}</span>
              <input
                id="identifiant"
                type="text"
                [(ngModel)]="identifiant"
                name="identifiant"
                [placeholder]="channel === 'email' ? prefs.translate('AUTH.FORGOT.EMAIL_PH') : prefs.translate('AUTH.FORGOT.PHONE_PH')"
                required
              />
            </div>
          </div>

          @if (err) { <div class="text-error mt-1">{{ err }}</div> }
          @if (success) { <div class="badge-success mt-1" style="text-align: center; padding: 0.75rem;">{{ success }}</div> }

          <button type="submit" class="btn-submit" [disabled]="loading">
            @if (loading) { <span class="spinner"></span> }
            @else { {{ prefs.translate('AUTH.FORGOT.SEND_LINK') }} <span class="arrow">→</span> }
          </button>
        </form>
        <div class="auth-links mt-2">
          <a routerLink="/auth/login">{{ prefs.translate('AUTH.FORGOT.BACK_LOGIN') }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
