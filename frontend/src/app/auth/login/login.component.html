
    <div class="min-h-screen bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
      <app-navbar />

      <div class="auth-container fade-in relative px-4 pb-16 pt-8">
        <div class="auth-wrapper mx-auto">
          <div class="logo-container">
            <span class="logo-icon">🩺</span>
            <h2>MedConnect</h2>
          </div>

          <div class="auth-card dark:border-slate-800 dark:bg-slate-900/80 dark:shadow-none">
            <div class="auth-header">
              <h3>{{ prefs.translate('auth.login.title') }}</h3>
              <p>{{ prefs.translate('auth.login.subtitle') }}</p>
            </div>

            <form (ngSubmit)="onLogin()" class="auth-form">
              <div class="form-group">
                <label for="identifiant">{{ prefs.translate('auth.login.identifiant') }}</label>
                <div class="input-with-icon">
                  <span class="icon">✉️</span>
                  <input
                    id="identifiant"
                    type="text"
                    [(ngModel)]="loginData.identifiant"
                    name="identifiant"
                    placeholder="email ou mobile"
                    required
                  />
                </div>
              </div>

              <div class="form-group">
                <label for="motDePasse">{{ prefs.translate('auth.login.password') }}</label>
                <div class="input-with-icon">
                  <span class="icon">🔒</span>
                  <input
                    id="motDePasse"
                    [type]="showPassword ? 'text' : 'password'"
                    [(ngModel)]="loginData.motDePasse"
                    name="motDePasse"
                    placeholder="••••••••"
                    required
                    class="pr-10"
                  />
                  <button
                    type="button"
                    class="toggle-password-btn"
                    (click)="showPassword = !showPassword"
                    [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
                  >
                    @if (showPassword) {
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                      </svg>
                    } @else {
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                      </svg>
                    }
                  </button>
                </div>
              </div>

              @if (errorMessage) {
                <div class="text-error">{{ errorMessage }}</div>
              }

              <button type="submit" class="btn-submit" [disabled]="loading">
                @if (loading) {
                  <span class="spinner"></span>
                } @else {
                  {{ prefs.translate('auth.login.submit') }} <span class="arrow">→</span>
                }
              </button>

              <div class="auth-links">
                <a routerLink="/auth/forgot-password">{{ prefs.translate('auth.login.forgot') }}</a>
                <div class="register-prompt">
                  {{ prefs.translate('auth.login.registerPrompt') }}
                  <a routerLink="/auth/register">{{ prefs.translate('auth.login.registerLink') }}</a>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
