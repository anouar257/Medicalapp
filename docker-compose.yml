version: '3.8'

services:
  # Base de données PostgreSQL unique pour tous les services
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: odoo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - mediconnect-network
    restart: always

  # Microservice Agenda
  agenda-service:
    build:
      context: ./backend/agenda-service
      dockerfile: Dockerfile
    container_name: agenda-service
    expose:
      - "8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/agenda_medical
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=odoo
      - PRACTITIONER_BASE_URL=http://practitioner-service:8083
      - JWT_SECRET=${JWT_SECRET:-changeme-patient-jwt-secret-256bit-min}
      - JWT_PRO_SECRET=${JWT_PRO_SECRET:-changeme-pro-jwt-secret-256bit-min}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - postgres-db
      - eureka-server
    volumes:
      - agenda_doctor_photos:/root/.agenda/doctor-photos
    networks:
      - mediconnect-network
    restart: always

  # Microservice Patient
  patient-service:
    build:
      context: ./backend/patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    expose:
      - "8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/patient_medical
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=odoo
      - JWT_SECRET=${JWT_SECRET:-changeme-patient-jwt-secret-256bit-min}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - postgres-db
      - eureka-server
    networks:
      - mediconnect-network
    restart: always

  # Microservice Praticien
  practitioner-service:
    build:
      context: ./backend/practitioner-service
      dockerfile: Dockerfile
    container_name: practitioner-service
    expose:
      - "8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/practitioner_medical
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=odoo
      - PATIENT_BASE_URL=http://patient-service:8082
      - AGENDA_BASE_URL=http://agenda-service:8081
      - JWT_PRO_SECRET=${JWT_PRO_SECRET:-changeme-pro-jwt-secret-256bit-min}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - postgres-db
      - eureka-server
    volumes:
      - practitioner_photos:/root/.practitioner/photos
    networks:
      - mediconnect-network
    restart: always

  # Microservice Messagerie
  messaging-service:
    build:
      context: ./backend/messaging-service
      dockerfile: Dockerfile
    container_name: messaging-service
    expose:
      - "8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/messaging_medical
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=odoo
      - AGENDA_BASE_URL=http://agenda-service:8081
      - PATIENT_BASE_URL=http://patient-service:8082
      - PRACTITIONER_BASE_URL=http://practitioner-service:8083
      - JWT_SECRET=${JWT_SECRET:-changeme-patient-jwt-secret-256bit-min}
      - JWT_PRO_SECRET=${JWT_PRO_SECRET:-changeme-pro-jwt-secret-256bit-min}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - postgres-db
      - eureka-server
    networks:
      - mediconnect-network
    restart: always

  # Microservice Paiement
  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    expose:
      - "8085"
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/payment_medical
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=odoo
      - AGENDA_BASE_URL=http://agenda-service:8081
      - JWT_PRO_SECRET=${JWT_PRO_SECRET:-changeme-pro-jwt-secret-256bit-min}
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - postgres-db
      - eureka-server
    networks:
      - mediconnect-network
    restart: always

  # Eureka Discovery Server
  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - mediconnect-network
    restart: always

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    expose:
      - "8090"
    environment:
      - SERVER_PORT=8090
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - mediconnect-network
    restart: always

  # Microservice IA (Python FastAPI)
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: ai-service
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - mediconnect-network
    restart: unless-stopped

  # Broker Apache Kafka (KRaft mode - sans Zookeeper)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    networks:
      - mediconnect-network
    restart: unless-stopped

  # Application Frontend Angular + Nginx (Reverse Proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80" # Mappe le port 4200 de l'hôte vers le port 80 de Nginx
    depends_on:
      - api-gateway
    networks:
      - mediconnect-network
    restart: always

volumes:
  postgres_data:
  agenda_doctor_photos:
  practitioner_photos:

networks:
  mediconnect-network:
    driver: bridge
